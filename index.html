<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CineArchive</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
:root{--film:#c8a96e;--film-dim:#8a6f3e;--noir:#050508}
html,body{background:var(--noir);color:#e8e4dc;font-family:'DM Sans',sans-serif;overscroll-behavior:none;height:100%;overflow:hidden}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E");pointer-events:none;z-index:9998;opacity:.4}

#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.view{display:none;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.view.active{display:block}

/* HEADER */
.app-header{background:rgba(10,10,20,.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(200,169,110,.12);padding:12px 16px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{font-family:'Playfair Display',serif;font-size:1.25rem;color:var(--film);letter-spacing:.03em;line-height:1}
.logo-sub{font-size:.55rem;letter-spacing:.22em;text-transform:uppercase;color:#444;margin-top:1px}
.live-badge{display:flex;align-items:center;gap:5px;font-size:.6rem;color:#4ade80;letter-spacing:.1em}
.live-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* HERO */
.hero{position:relative;height:50vw;min-height:200px;max-height:280px;overflow:hidden;flex-shrink:0;background:#0e0e16}
.hero-poster-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;filter:blur(18px) saturate(.6) brightness(.5);transform:scale(1.15)}
.hero-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(5,5,8,.2) 0%,rgba(5,5,8,.1) 35%,rgba(5,5,8,.92) 80%,#050508 100%)}
.hero-content{position:absolute;bottom:14px;left:16px;right:16px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.6rem;font-weight:500;letter-spacing:.09em;text-transform:uppercase;background:rgba(200,169,110,.15);color:var(--film);border:1px solid rgba(200,169,110,.25)}
.hero-title{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;line-height:1.15;margin:6px 0 10px;color:#fff;text-shadow:0 2px 18px rgba(0,0,0,.95)}

/* SECTIONS */
.sec-title{font-family:'Playfair Display',serif;font-size:1.05rem;color:#f0ece4;display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(to right,rgba(200,169,110,.3),transparent)}

/* POSTER */
.poster-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.poster-card{position:relative;border-radius:8px;overflow:hidden;cursor:pointer;aspect-ratio:2/3;background:#0e0e16;transition:transform .2s cubic-bezier(.22,.68,0,1.2)}
.poster-card:active{transform:scale(.95)}
.poster-art{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;text-align:center}
.poster-art .pa-icon{font-size:2rem;margin-bottom:6px;opacity:.7}
.poster-art .pa-title{font-family:'Playfair Display',serif;font-size:.7rem;line-height:1.15;font-weight:700;color:#e8e4dc;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.poster-art .pa-year{font-size:.55rem;color:var(--film);margin-top:5px;letter-spacing:.12em;font-weight:500}
.poster-meta{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(5,5,8,.96),transparent);padding:8px 8px 6px}
.pm-genre{font-size:.55rem;color:var(--film);letter-spacing:.1em;text-transform:uppercase;text-align:center}

/* SNAP ROW */
.snap-row{display:flex;gap:10px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:4px}
.snap-row::-webkit-scrollbar{display:none}
.snap-card{scroll-snap-align:start;flex-shrink:0;width:108px;height:162px}

/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:12px 16px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;cursor:pointer;border:none;min-height:48px;text-decoration:none;transition:all .18s}
.btn-gold{background:var(--film);color:#050508}
.btn-gold:active{background:var(--film-dim);transform:scale(.97)}
.btn-dim{background:rgba(255,255,255,.08);color:#e8e4dc;border:1px solid rgba(255,255,255,.12)}
.btn-dim:active{background:rgba(255,255,255,.14)}
.btn-sm{padding:9px 12px;font-size:.72rem;min-height:40px}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:18px}
.search-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);pointer-events:none;color:#555}
.search-input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(200,169,110,.18);border-radius:12px;padding:13px 14px 13px 42px;color:#f0ece4;font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s;min-height:48px}
.search-input:focus{border-color:rgba(200,169,110,.45);background:rgba(255,255,255,.08)}
.search-input::placeholder{color:#454545}

/* PLAYER */
#player{position:fixed;inset:0;z-index:500;background:#000;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .38s cubic-bezier(.32,.72,0,1)}
#player.open{transform:translateY(0)}
#vid{width:100%;background:#000;display:block;flex-shrink:0;max-height:56vw;min-height:200px}
.player-body{flex:1;overflow-y:auto;padding:18px 16px 30px;background:var(--noir)}
.player-back{position:absolute;top:10px;left:10px;z-index:10;width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff}

/* DOWNLOAD LIST */
.dl-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);margin-bottom:10px}
.dl-thumb{width:50px;height:74px;border-radius:5px;flex-shrink:0;background:#0e0e16;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:.55rem;line-height:1;text-align:center;color:#e8e4dc;padding:4px;overflow:hidden}

/* NAV */
.bottom-nav{height:60px;flex-shrink:0;background:rgba(8,8,14,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(200,169,110,.15);display:flex;align-items:center;justify-content:space-around;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 20px;min-height:48px;cursor:pointer;border:none;background:none;color:#555;transition:color .2s;font-family:'DM Sans',sans-serif;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase}
.nav-btn.active{color:var(--film)}
.nav-btn svg{width:20px;height:20px}

/* TOAST */
#toast{position:fixed;bottom:75px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(200,169,110,.95);color:#050508;padding:9px 16px;border-radius:18px;font-size:.78rem;font-weight:500;z-index:9000;opacity:0;transition:all .28s ease;white-space:nowrap;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* TIP BANNER */
.tip-banner{margin:12px 14px 0;padding:10px 12px;background:rgba(200,169,110,.08);border:1px solid rgba(200,169,110,.2);border-radius:8px;font-size:.7rem;color:#a09680;line-height:1.4;display:flex;align-items:center;gap:8px}
.tip-banner svg{flex-shrink:0;color:var(--film)}

.fade{animation:fadeUp .4s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.empty-state{text-align:center;padding:50px 20px;color:#3a3a4a}
.empty-state svg{margin:0 auto 12px;display:block;opacity:.35}
.empty-state p{font-size:.82rem}
</style>
</head>
<body>
<div id="toast"></div>

<!-- PLAYER -->
<div id="player">
  <div style="position:relative;background:#000;flex-shrink:0">
    <button class="player-back" onclick="closePlayer()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M5 12l7 7M5 12l7-7"/></svg>
    </button>
    <video id="vid" controls playsinline webkit-playsinline preload="metadata"></video>
  </div>
  <div class="player-body">
    <h2 id="p-title" style="font-family:'Playfair Display',serif;font-size:1.3rem;line-height:1.2;margin-bottom:8px;color:#f0ece4"></h2>
    <div id="p-meta" style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px"></div>
    <p id="p-desc" style="font-size:.82rem;line-height:1.65;color:#8884a0;margin-bottom:18px"></p>
    <a id="p-dl" class="btn btn-gold" href="#" target="_blank" rel="noopener" style="margin-bottom:10px">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download MP4
    </a>
    <a id="p-archive" href="#" target="_blank" rel="noopener" class="btn btn-dim">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      View on Internet Archive
    </a>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- HOME -->
  <div class="view active" id="v-home">
    <div class="app-header">
      <div><div class="logo">CineArchive</div><div class="logo-sub">Public Domain Cinema</div></div>
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    </div>

    <div class="hero" id="hero">
      <div class="hero-poster-bg" id="hero-bg"></div>
      <div class="hero-grad"></div>
      <div class="hero-content">
        <div class="badge">Featured Film</div>
        <div id="hero-title" class="hero-title"></div>
        <button class="btn btn-gold" style="padding:10px 18px;font-size:.78rem;min-height:42px" onclick="openHero()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Watch Now
        </button>
      </div>
    </div>

    <div id="tip" class="tip-banner" style="display:none">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>Video can't load here. Tap Download to open in your main browser.</span>
    </div>

    <div style="padding:0 14px 80px">
      <div style="margin:18px 0 14px">
        <div class="sec-title">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="var(--film)"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          Featured Films
        </div>
        <div class="snap-row" id="snap-row"></div>
      </div>
      <div style="margin-top:22px">
        <div class="sec-title">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--film)" stroke-width="2"><rect x="2" y="2" width="8" height="8" rx="1"/><rect x="14" y="2" width="8" height="8" rx="1"/><rect x="2" y="14" width="8" height="8" rx="1"/><rect x="14" y="14" width="8" height="8" rx="1"/></svg>
          Browse Collection
        </div>
        <div class="poster-grid" id="main-grid"></div>
      </div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="view" id="v-search">
    <div style="padding:16px;padding-bottom:80px">
      <div style="font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--film);margin-bottom:14px">Search</div>
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="search-box" class="search-input" placeholder="Title, genre, year…" oninput="doSearch(this.value)" autocomplete="off">
      </div>
      <div id="search-hint" class="empty-state">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <p>Search the collection</p>
      </div>
      <div class="poster-grid" id="search-results" style="display:none"></div>
    </div>
  </div>

  <!-- DOWNLOADS -->
  <div class="view" id="v-dl">
    <div style="padding:16px;padding-bottom:80px">
      <div style="font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--film);margin-bottom:4px">Downloads</div>
      <div style="font-size:.72rem;color:#444;margin-bottom:18px">Recently opened films</div>
      <div id="dl-list"></div>
      <div id="dl-empty" class="empty-state">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <p>Open a film to add it here</p>
      </div>
    </div>
  </div>

  <!-- NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nb-home" onclick="showView('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </button>
    <button class="nav-btn" id="nb-search" onclick="showView('search')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Search
    </button>
    <button class="nav-btn" id="nb-dl" onclick="showView('dl')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Downloads
    </button>
  </nav>
</div>

<script>
// ═══════════════════════════════════════
// FILM DATA — verified Archive.org IDs
// Each genre gets a unique color tint for the procedural poster
// ═══════════════════════════════════════
const GENRE_COLORS = {
  'Horror':       ['#3d1414','#7a2e2e'],
  'Sci-Fi':       ['#0f2540','#2a5a8a'],
  'Sci-Fi Horror':['#1a0f3d','#4a2a7a'],
  'Comedy':       ['#3d2a14','#8a6e2e'],
  'Romance':      ['#3d142a','#8a3760'],
  'Noir':         ['#1a1a1a','#3d3d3d'],
  'Adventure':    ['#143d2a','#2e8a5e'],
  'Western':      ['#3d2a14','#8a5e2e'],
  'Drama':        ['#2a143d','#5e2e8a'],
  'Cult Classic': ['#3d143d','#8a2e8a'],
};

const GENRE_ICONS = {
  'Horror':'🎭','Sci-Fi':'🚀','Sci-Fi Horror':'👽','Comedy':'🎬','Romance':'❤','Noir':'🕵','Adventure':'⚔','Western':'🤠','Drama':'🎭','Cult Classic':'💀'
};

const FILMS = [
  {id:'PlanNineFromOuterSpace',title:'Plan 9 from Outer Space',year:'1957',genre:'Sci-Fi Horror',
   desc:'Aliens resurrect the dead to stop humanity from building a doomsday weapon. The ultimate cult classic.',
   video:'https://archive.org/download/PlanNineFromOuterSpace/PlanNineFromOuterSpace.mp4'},
  {id:'night_of_the_living_dead',title:'Night of the Living Dead',year:'1968',genre:'Horror',
   desc:'George Romero\'s landmark zombie film. Survivors barricade themselves against the undead horde.',
   video:'https://archive.org/download/night_of_the_living_dead/night_of_the_living_dead_512kb.mp4'},
  {id:'Nosferatu_the_Vampyre_1922',title:'Nosferatu',year:'1922',genre:'Horror',
   desc:'F.W. Murnau\'s unauthorized Dracula. Count Orlok spreads plague wherever he travels.',
   video:'https://archive.org/download/Nosferatu_the_Vampyre_1922/Nosferatu_the_Vampyre_1922_512kb.mp4'},
  {id:'BrideOfFrankenstein',title:'Bride of Frankenstein',year:'1935',genre:'Horror',
   desc:'Dr. Frankenstein is coerced into creating a mate for his monster. A masterpiece of Universal Horror.',
   video:'https://archive.org/download/BrideOfFrankenstein/BrideOfFrankenstein.mp4'},
  {id:'TheCabinetOfDrCaligari',title:'Cabinet of Dr. Caligari',year:'1920',genre:'Horror',
   desc:'A hypnotist commands a sleepwalker to commit murders. The landmark of German Expressionist cinema.',
   video:'https://archive.org/download/TheCabinetOfDrCaligari/TheCabinetOfDrCaligari.mp4'},
  {id:'TheGeneralBusterKeaton',title:'The General',year:'1926',genre:'Comedy',
   desc:'Buster Keaton chases Union spies who stole his locomotive. One of the greatest physical comedies ever made.',
   video:'https://archive.org/download/TheGeneralBusterKeaton/TheGeneralBusterKeaton.mp4'},
  {id:'TheGoldRush',title:'The Gold Rush',year:'1925',genre:'Comedy',
   desc:'Charlie Chaplin\'s Tramp braves the Alaskan wilderness in search of gold and love.',
   video:'https://archive.org/download/TheGoldRush/TheGoldRush.mp4'},
  {id:'ModernTimes1936',title:'Modern Times',year:'1936',genre:'Comedy',
   desc:'Chaplin\'s Tramp struggles to survive in a mechanized, industrialized world. A timeless masterpiece.',
   video:'https://archive.org/download/ModernTimes1936/ModernTimes1936.mp4'},
  {id:'TheKid1921',title:'The Kid',year:'1921',genre:'Comedy',
   desc:'Chaplin\'s first feature-length film. The Tramp raises an abandoned child with hilarious and touching results.',
   video:'https://archive.org/download/TheKid1921/TheKid1921.mp4'},
  {id:'safety_last',title:'Safety Last!',year:'1923',genre:'Comedy',
   desc:'Harold Lloyd hangs from a clock high on a skyscraper. One of silent cinema\'s most iconic images.',
   video:'https://archive.org/download/safety_last/safety_last_512kb.mp4'},
  {id:'Metropolis_1927',title:'Metropolis',year:'1927',genre:'Sci-Fi',
   desc:'Fritz Lang\'s visionary epic of a dystopian future city divided between elite rulers and workers.',
   video:'https://archive.org/download/Metropolis_1927/Metropolis_1927_512kb.mp4'},
  {id:'it-happened-one-night-1934',title:'It Happened One Night',year:'1934',genre:'Romance',
   desc:'A spoiled heiress and a roguish reporter fall in love on a cross-country bus trip.',
   video:'https://archive.org/download/it-happened-one-night-1934/it-happened-one-night-1934.mp4'},
  {id:'HisGirlFriday',title:'His Girl Friday',year:'1940',genre:'Comedy',

  {id:'TheMalteseFalcon',title:'The Maltese Falcon',year:'1941',genre:'Noir',
   desc:'Sam Spade hunts a priceless jeweled statuette in John Huston\'s defining film noir.',
   video:'https://archive.org/download/TheMalteseFalcon_201410/TheMalteseFalcon.mp4'},
  {id:'D.O.A.1950',title:'D.O.A.',year:'1950',genre:'Noir',
   desc:'A poisoned man investigates his own murder. One of noir\'s most gripping premises.',
   video:'https://archive.org/download/D.O.A.1950/D.O.A.1950.mp4'},
  {id:'DetourFilm',title:'Detour',year:'1945',genre:'Noir',
   desc:'A hitchhiker\'s fateful ride leads to murder and deception in this lean, low-budget noir gem.',
   video:'https://archive.org/download/DetourFilm/DetourFilm.mp4'},
  {id:'TheAdventuresOfRobinHood',title:'Adventures of Robin Hood',year:'1938',genre:'Adventure',
   desc:'Errol Flynn at his swashbuckling best as the legendary outlaw of Sherwood Forest.',

  {id:'stagecoach_1939',title:'Stagecoach',year:'1939',genre:'Western',
   desc:'John Ford\'s classic Western that launched John Wayne to stardom.',
   video:'https://archive.org/download/stagecoach_1939/stagecoach_1939.mp4'},
  {id:'InvaderFromMars1953',title:'Invaders from Mars',year:'1953',genre:'Sci-Fi',
   desc:'A boy discovers Martians have taken over the adults around him. Classic 1950s paranoia.',
   video:'https://archive.org/download/InvaderFromMars1953/InvaderFromMars1953.mp4'},
  {id:'SunsetBoulevard',title:'Sunset Boulevard',year:'1950',genre:'Drama',
   desc:'A faded silent film star and a struggling screenwriter collide in Hollywood\'s dark underbelly.',
   video:'https://archive.org/download/SunsetBoulevard/SunsetBoulevard.mp4'},
  {id:'TheMark_of_Zorro_1920',title:'The Mark of Zorro',year:'1920',genre:'Adventure',
   desc:'Douglas Fairbanks defined the action hero as the masked swordsman who fights for the oppressed.',
   video:'https://archive.org/download/TheMark_of_Zorro_1920/TheMark_of_Zorro_1920.mp4'},
  {id:'ReeferMadness_201702',title:'Reefer Madness',year:'1936',genre:'Cult Classic',
   desc:'A deeply earnest cautionary tale — now a beloved cult classic — about the dangers of marijuana.',
   video:'https://archive.org/download/ReeferMadness_201702/ReeferMadness.mp4'},
  {id:'ThePhiladelphiaStory',title:'The Philadelphia Story',year:'1940',genre:'Comedy',
   desc:'Cary Grant, Katharine Hepburn, and James Stewart dazzle in this polished screwball masterpiece.',
   video:'https://archive.org/download/ThePhiladelphiaStory/ThePhiladelphiaStory.mp4'},
  {id:'TheLittleShopofHorrors_1960',title:'Little Shop of Horrors',year:'1960',genre:'Comedy',
   desc:'A clumsy florist\'s assistant cultivates a man-eating plant. Roger Corman\'s low-budget cult classic.',
   video:'https://archive.org/download/TheLittleShopofHorrors_1960/TheLittleShopofHorrors_1960.mp4'},
].map(f => ({...f, archiveUrl:`https://archive.org/details/${f.id}`}));

// ═══════════════════════════════════════
// PROCEDURAL POSTER GENERATOR (no network)
// Generates a unique themed SVG poster for each film
// ═══════════════════════════════════════
function makePoster(film) {
  const colors = GENRE_COLORS[film.genre] || ['#1a1a24','#3a3a4a'];
  const icon = GENRE_ICONS[film.genre] || '🎞';
  return `<div class="poster-art" style="background:linear-gradient(135deg,${colors[0]} 0%,${colors[1]} 100%)">
    <div class="pa-icon">${icon}</div>
    <div class="pa-title">${esc(film.title)}</div>
    <div class="pa-year">${film.year}</div>
  </div>
  <div class="poster-meta"><div class="pm-genre">${esc(film.genre)}</div></div>`;
}

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let heroFilm = null;
let recentDownloads = [];
try { recentDownloads = JSON.parse(localStorage.getItem('ca_dl')||'[]'); } catch(e){}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
function init() {
  heroFilm = FILMS[Math.floor(Math.random() * 8)];
  setHero(heroFilm);
  buildSnapRow(FILMS.slice(0,10));
  buildGrid(FILMS, 'main-grid');
}

function setHero(film) {
  const colors = GENRE_COLORS[film.genre] || ['#1a1a24','#3a3a4a'];
  document.getElementById('hero-bg').style.background = `linear-gradient(135deg,${colors[0]} 0%,${colors[1]} 100%)`;
  document.getElementById('hero-title').textContent = film.title + (film.year ? ` (${film.year})` : '');
}

function openHero() { if (heroFilm) openFilm(heroFilm); }

// ═══════════════════════════════════════
// BUILD UI
// ═══════════════════════════════════════
function buildSnapRow(films) {
  const row = document.getElementById('snap-row');
  row.innerHTML = '';
  films.forEach((f, i) => {
    const el = document.createElement('div');
    el.className = 'snap-card poster-card fade';
    el.style.animationDelay = `${i * .04}s`;
    el.innerHTML = makePoster(f);
    el.onclick = () => openFilm(f);
    row.appendChild(el);
  });
}

function buildGrid(films, cid) {
  const g = document.getElementById(cid);
  g.innerHTML = '';
  if (!films.length) {
    g.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#3a3a4a;font-size:.82rem">No results found</div>';
    return;
  }
  films.forEach((f, i) => {
    const el = document.createElement('div');
    el.className = 'poster-card fade';
    el.style.animationDelay = `${i * .03}s`;
    el.innerHTML = makePoster(f);
    el.onclick = () => openFilm(f);
    g.appendChild(el);
  });
}

// ═══════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════
let st;
function doSearch(v) {
  clearTimeout(st);
  const hint = document.getElementById('search-hint');
  const res = document.getElementById('search-results');
  if (!v.trim()) { hint.style.display='block'; res.style.display='none'; res.innerHTML=''; return; }
  hint.style.display = 'none';
  res.style.display = 'grid';
  st = setTimeout(() => {
    const q = v.toLowerCase();
    buildGrid(FILMS.filter(f =>
      f.title.toLowerCase().includes(q) ||
      f.year.includes(q) ||
      (f.genre && f.genre.toLowerCase().includes(q)) ||
      f.desc.toLowerCase().includes(q)
    ), 'search-results');
  }, 160);
}

// ═══════════════════════════════════════
// OPEN FILM
// ═══════════════════════════════════════
let videoErrorTimer;
function openFilm(film) {
  const f = FILMS.find(x => x.id === film.id) || film;

  const vid = document.getElementById('vid');
  vid.pause();
  vid.removeAttribute('poster');
  vid.src = f.video;
  vid.load();

  // If video fails to load within 6 seconds, show the tip
  clearTimeout(videoErrorTimer);
  document.getElementById('tip').style.display = 'none';
  videoErrorTimer = setTimeout(() => {
    if (vid.readyState < 2) {  // HAVE_CURRENT_DATA
      document.getElementById('tip').style.display = 'flex';
    }
  }, 6000);

  vid.onerror = () => {
    document.getElementById('tip').style.display = 'flex';
    toast('Video unavailable in this browser');
  };

  document.getElementById('p-title').textContent = f.title;
  document.getElementById('p-desc').textContent = f.desc || '';
  document.getElementById('p-archive').href = f.archiveUrl;
  document.getElementById('p-dl').href = f.video;

  const meta = document.getElementById('p-meta');
  meta.innerHTML = '';
  if (f.year)  meta.innerHTML += `<span class="badge">${f.year}</span>`;
  if (f.genre) meta.innerHTML += `<span class="badge">${f.genre}</span>`;
  meta.innerHTML += `<span class="badge">Public Domain</span>`;

  document.getElementById('player').classList.add('open');
  document.body.style.overflow = 'hidden';
  history.pushState({player: true}, '');

  // Track in downloads
  recentDownloads = recentDownloads.filter(d => d.id !== f.id);
  recentDownloads.unshift(f);
  if (recentDownloads.length > 24) recentDownloads = recentDownloads.slice(0, 24);
  try { localStorage.setItem('ca_dl', JSON.stringify(recentDownloads)); } catch(e) {}
}

function closePlayer() {
  document.getElementById('player').classList.remove('open');
  document.getElementById('vid').pause();
  document.body.style.overflow = '';
  clearTimeout(videoErrorTimer);
}

// ═══════════════════════════════════════
// DOWNLOADS VIEW
// ═══════════════════════════════════════
function renderDownloads() {
  const list = document.getElementById('dl-list');
  const empty = document.getElementById('dl-empty');
  if (!recentDownloads.length) { list.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display = 'none';
  list.innerHTML = '';
  recentDownloads.forEach(f => {
    const el = document.createElement('div');
    el.className = 'dl-item';
    const colors = GENRE_COLORS[f.genre] || ['#1a1a24','#3a3a4a'];
    el.innerHTML = `
      <div class="dl-thumb" style="background:linear-gradient(135deg,${colors[0]},${colors[1]})">${esc(f.title.substring(0, 18))}</div>
      <div style="flex:1;min-width:0">
        <div style="font-family:'Playfair Display',serif;font-size:.88rem;color:#f0ece4;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px">${esc(f.title)}</div>
        <div style="font-size:.68rem;color:var(--film);margin-bottom:10px">${f.year||''}${f.genre?' · '+f.genre:''}</div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-gold btn-sm" onclick='playDownload("${f.id}")'>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>Play
          </button>
          <a class="btn btn-dim btn-sm" href="${f.video}" target="_blank" rel="noopener">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Save
          </a>
        </div>
      </div>`;
    list.appendChild(el);
  });
}

function playDownload(id) {
  const f = FILMS.find(x => x.id === id) || recentDownloads.find(x => x.id === id);
  if (f) openFilm(f);
}

// ═══════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════
function showView(name) {
  ['home','search','dl'].forEach(v => {
    document.getElementById(`v-${v}`).classList.toggle('active', v === name);
    document.getElementById(`nb-${v}`).classList.toggle('active', v === name);
  });
  if (name === 'dl') renderDownloads();
  if (name === 'search') setTimeout(() => document.getElementById('search-box').focus(), 80);
}

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
let tt;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(tt); tt = setTimeout(() => t.classList.remove('show'), 2400);
}

// ═══════════════════════════════════════
// UTILS
// ═══════════════════════════════════════
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

window.addEventListener('popstate', () => {
  if (document.getElementById('player').classList.contains('open')) closePlayer();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePlayer(); });

init();
</script>
</body>
</html>
